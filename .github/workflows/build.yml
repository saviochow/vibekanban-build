name: Build and publish images

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build.yml'
      - 'build.env'
  schedule:
    # Check upstream every hour — skips build if no new commit
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      vibekanban_ref:
        description: 'vibekanban git ref to build (branch, tag, or commit)'
        required: false
        default: 'main'
      force:
        description: 'Force rebuild even if no upstream changes'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  VIBEKANBAN_REPO: BloopAI/vibe-kanban

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      sha: ${{ steps.check.outputs.sha }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for upstream changes
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          REF="${{ github.event.inputs.vibekanban_ref || 'main' }}"
          FORCE="${{ github.event.inputs.force || 'false' }}"

          # Get latest upstream SHA (full, then short)
          FULL_SHA=$(gh api repos/${{ env.VIBEKANBAN_REPO }}/commits/$REF --jq '.sha')
          SHORT_SHA=${FULL_SHA:0:7}
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Upstream $REF is at $SHORT_SHA"

          if [ "$FORCE" = "true" ]; then
            echo "Force rebuild requested"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Push to main — always rebuild"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if an image with this SHA already exists using docker manifest
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/vibekanban-app:$SHORT_SHA"
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "Image $IMAGE already exists — skipping build"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "No image $IMAGE found — will build"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Load build config
        run: |
          if [ -f build.env ]; then
            grep -v '^#' build.env | grep -v '^$' >> $GITHUB_ENV
          fi

      - name: Clone vibekanban source
        run: |
          REF="${{ github.event.inputs.vibekanban_ref || 'main' }}"
          git clone --depth 1 --branch "$REF" https://github.com/${{ env.VIBEKANBAN_REPO }}.git vibekanban || \
            git clone https://github.com/${{ env.VIBEKANBAN_REPO }}.git vibekanban
          if [ "$REF" != "main" ]; then
            git -C vibekanban checkout "$REF" || true
          fi
          echo "VIBEKANBAN_SHA=${{ needs.check.outputs.sha }}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push relay image
        uses: docker/build-push-action@v5
        with:
          context: vibekanban
          file: vibekanban/crates/relay-tunnel/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/vibekanban-relay:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/vibekanban-relay:${{ env.VIBEKANBAN_SHA }}
          cache-from: type=gha,scope=relay
          cache-to: type=gha,scope=relay,mode=max

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: vibekanban
          file: vibekanban/crates/remote/Dockerfile
          push: true
          build-args: |
            VITE_RELAY_API_BASE_URL=${{ env.VITE_RELAY_API_BASE_URL }}
            SENTRY_DSN_REMOTE=${{ env.SENTRY_DSN_REMOTE }}
            POSTHOG_API_KEY=${{ env.POSTHOG_API_KEY }}
            POSTHOG_API_ENDPOINT=${{ env.POSTHOG_API_ENDPOINT }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/vibekanban-app:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/vibekanban-app:${{ env.VIBEKANBAN_SHA }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,scope=app,mode=max
