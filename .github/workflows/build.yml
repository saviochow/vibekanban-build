name: Build and publish images

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build.yml'
      - 'build.env'
  schedule:
    # Check upstream every hour — skips build if no new commit
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      vibekanban_ref:
        description: 'vibekanban git ref to build (branch, tag, or commit). Overrides VIBEKANBAN_REF in build.env.'
        required: false
        default: ''
      force:
        description: 'Force rebuild even if no upstream changes'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  VIBEKANBAN_REPO: BloopAI/vibe-kanban

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      sha: ${{ steps.check.outputs.sha }}
      ref: ${{ steps.check.outputs.ref }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve ref and check for upstream changes
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          FORCE="${{ github.event.inputs.force || 'false' }}"

          # Priority: workflow input > build.env > "main"
          INPUT_REF="${{ github.event.inputs.vibekanban_ref }}"
          if [ -n "$INPUT_REF" ]; then
            REF="$INPUT_REF"
          elif [ -f build.env ] && grep -q '^VIBEKANBAN_REF=' build.env; then
            REF=$(grep '^VIBEKANBAN_REF=' build.env | cut -d= -f2-)
          fi
          REF="${REF:-main}"
          echo "ref=$REF" >> $GITHUB_OUTPUT
          echo "Resolved ref: $REF"

          # Extract version from ref (e.g. v0.1.43-20260417125614 → v0.1.43)
          VERSION=$(echo "$REF" | grep -oE '^v[0-9]+\.[0-9]+\.[0-9]+' || echo "")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Get latest upstream SHA
          FULL_SHA=$(gh api repos/${{ env.VIBEKANBAN_REPO }}/commits/$REF --jq '.sha')
          SHORT_SHA=${FULL_SHA:0:7}
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Upstream $REF is at $SHORT_SHA"

          if [ "$FORCE" = "true" ]; then
            echo "Force rebuild requested"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Push to main — always rebuild"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if an image with this SHA already exists
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/vibekanban-app:$SHORT_SHA"
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "Image $IMAGE already exists — skipping build"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "No image $IMAGE found — will build"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Load build config
        run: |
          # Load defaults from build.env
          if [ -f build.env ]; then
            grep -v '^#' build.env | grep -v '^$' >> $GITHUB_ENV
          fi
          # Repo variables override build.env (set in Settings → Secrets and variables → Actions → Variables)
          if [ -n "${{ vars.VITE_RELAY_API_BASE_URL }}" ]; then
            echo "VITE_RELAY_API_BASE_URL=${{ vars.VITE_RELAY_API_BASE_URL }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ vars.SENTRY_DSN_REMOTE }}" ]; then
            echo "SENTRY_DSN_REMOTE=${{ vars.SENTRY_DSN_REMOTE }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ vars.POSTHOG_API_KEY }}" ]; then
            echo "POSTHOG_API_KEY=${{ vars.POSTHOG_API_KEY }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ vars.POSTHOG_API_ENDPOINT }}" ]; then
            echo "POSTHOG_API_ENDPOINT=${{ vars.POSTHOG_API_ENDPOINT }}" >> $GITHUB_ENV
          fi

      - name: Clone vibekanban source
        run: |
          REF="${{ needs.check.outputs.ref }}"
          git clone --depth 1 --branch "$REF" https://github.com/${{ env.VIBEKANBAN_REPO }}.git vibekanban || \
            git clone https://github.com/${{ env.VIBEKANBAN_REPO }}.git vibekanban
          if [ "$REF" != "main" ]; then
            git -C vibekanban checkout "$REF" || true
          fi
          echo "VIBEKANBAN_SHA=${{ needs.check.outputs.sha }}" >> $GITHUB_ENV

      - name: Compute image tags
        id: tags
        run: |
          SHA="${{ needs.check.outputs.sha }}"
          VERSION="${{ needs.check.outputs.version }}"

          # Always tag with :latest and :<sha>
          RELAY_TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/vibekanban-relay:latest"
          RELAY_TAGS="$RELAY_TAGS,${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/vibekanban-relay:$SHA"
          APP_TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/vibekanban-app:latest"
          APP_TAGS="$APP_TAGS,${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/vibekanban-app:$SHA"

          # Add version tag if building from a versioned ref (e.g. v0.1.43)
          if [ -n "$VERSION" ]; then
            RELAY_TAGS="$RELAY_TAGS,${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/vibekanban-relay:$VERSION"
            APP_TAGS="$APP_TAGS,${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/vibekanban-app:$VERSION"
          fi

          echo "relay_tags=$RELAY_TAGS" >> $GITHUB_OUTPUT
          echo "app_tags=$APP_TAGS" >> $GITHUB_OUTPUT
          echo "Tags: relay=$RELAY_TAGS app=$APP_TAGS"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push relay image
        uses: docker/build-push-action@v5
        with:
          context: vibekanban
          file: vibekanban/crates/relay-tunnel/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.relay_tags }}
          cache-from: type=gha,scope=relay
          cache-to: type=gha,scope=relay,mode=max

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: vibekanban
          file: vibekanban/crates/remote/Dockerfile
          push: true
          build-args: |
            VITE_RELAY_API_BASE_URL=${{ env.VITE_RELAY_API_BASE_URL }}
            SENTRY_DSN_REMOTE=${{ env.SENTRY_DSN_REMOTE }}
            POSTHOG_API_KEY=${{ env.POSTHOG_API_KEY }}
            POSTHOG_API_ENDPOINT=${{ env.POSTHOG_API_ENDPOINT }}
          tags: ${{ steps.tags.outputs.app_tags }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,scope=app,mode=max
