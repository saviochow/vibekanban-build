services:
  db:
    image: postgres:16-alpine
    command: ["postgres", "-c", "wal_level=logical"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: remote
      POSTGRES_USER: remote
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remote"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"

  electric:
    image: electricsql/electric:1.4.13
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://electric_sync:${ELECTRIC_ROLE_PASSWORD}@db:5432/remote?sslmode=disable
      PG_PROXY_PORT: 65432
      LOGICAL_PUBLISHER_HOST: electric
      AUTH_MODE: insecure
      ELECTRIC_INSECURE: true
      ELECTRIC_MANUAL_TABLE_PUBLISHING: true
      ELECTRIC_USAGE_REPORTING: false
      ELECTRIC_FEATURE_FLAGS: allow_subqueries,tagged_subqueries
    volumes:
      - electric-data:/app/persistent
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy

  relay:
    image: ghcr.io/saviochow/vibekanban-relay:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      RUST_LOG: info
      SERVER_DATABASE_URL: postgres://remote:${DB_PASSWORD}@db:5432/remote
      RELAY_LISTEN_ADDR: 0.0.0.0:8082
      VIBEKANBAN_REMOTE_JWT_SECRET: ${VIBEKANBAN_REMOTE_JWT_SECRET}

  app:
    image: ghcr.io/saviochow/vibekanban-app:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      RUST_LOG: info,remote=info
      SERVER_DATABASE_URL: postgres://remote:${DB_PASSWORD}@db:5432/remote
      SERVER_LISTEN_ADDR: 0.0.0.0:8081
      ELECTRIC_URL: http://electric:3000
      ELECTRIC_ROLE_PASSWORD: ${ELECTRIC_ROLE_PASSWORD}
      SERVER_PUBLIC_BASE_URL: ${APP_URL}
      VIBEKANBAN_REMOTE_JWT_SECRET: ${VIBEKANBAN_REMOTE_JWT_SECRET}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_APP_WEBHOOK_SECRET: ${GITHUB_APP_WEBHOOK_SECRET:-}
      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8081/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  cert-init:
    image: alpine:latest
    environment:
      APP_URL: ${APP_URL}
      RELAY_URL: ${RELAY_URL}
      CERT_EXTRA_SANS: ${CERT_EXTRA_SANS:-}
    volumes:
      - certs:/certs
    command:
      - sh
      - -c
      - |
        set -e
        if [ -f /certs/selfsigned.crt ]; then
          echo "Cert already exists, skipping generation"
          exit 0
        fi
        apk add --no-cache openssl
        CERT_HOST=$$(echo "$$APP_URL" | sed 's|https://||; s|http://||; s|:.*||; s|/.*||')
        RELAY_HOST=$$(echo "$$RELAY_URL" | sed 's|https://||; s|http://||; s|:.*||; s|/.*||')
        SANS="DNS:$$CERT_HOST,DNS:$$RELAY_HOST"
        if [ -n "$$CERT_EXTRA_SANS" ]; then
          for entry in $$CERT_EXTRA_SANS; do
            case "$$entry" in
              *[0-9].[0-9]*.[0-9]*.[0-9]*) SANS="$$SANS,IP:$$entry" ;;
              *) SANS="$$SANS,DNS:$$entry" ;;
            esac
          done
        fi
        echo "Generating self-signed cert with SANs: $$SANS"
        openssl req -x509 -newkey rsa:2048 -days 1825 -nodes \
          -keyout /certs/selfsigned.key \
          -out /certs/selfsigned.crt \
          -subj "/CN=$$CERT_HOST" \
          -addext "subjectAltName=$$SANS"

  proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "11443:443"
      - "12443:8443"
    volumes:
      - certs:/etc/nginx/certs:ro
    depends_on:
      cert-init:
        condition: service_completed_successfully
      app:
        condition: service_healthy
      relay:
        condition: service_started
    command:
      - sh
      - -c
      - |
        cat > /etc/nginx/conf.d/default.conf <<'EOF'
        server {
            listen 443 ssl;
            ssl_certificate /etc/nginx/certs/selfsigned.crt;
            ssl_certificate_key /etc/nginx/certs/selfsigned.key;
            location / {
                proxy_pass http://app:8081;
                proxy_set_header Host $$host;
                proxy_set_header X-Forwarded-Proto https;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $$http_upgrade;
                proxy_set_header Connection "upgrade";
            }
        }
        server {
            listen 8443 ssl;
            ssl_certificate /etc/nginx/certs/selfsigned.crt;
            ssl_certificate_key /etc/nginx/certs/selfsigned.key;
            location / {
                proxy_pass http://relay:8082;
                proxy_set_header Host $$host;
                proxy_set_header X-Forwarded-Proto https;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $$http_upgrade;
                proxy_set_header Connection "upgrade";
            }
        }
        EOF
        exec nginx -g 'daemon off;'
        
volumes:
  db-data:
  electric-data:
  certs:
